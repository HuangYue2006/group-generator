<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分組產生器</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  font-size: 18px;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

.container {
  width: 100%;
  max-width: 900px;
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.input-section {
  flex: 0 0 300px;
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

textarea {
  width: 100%;
  min-height: 300px;
  padding: 16px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 18px;
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

textarea:focus {
  border-color: #4a6cf7;
}

.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.btn {
  flex: 1;
  padding: 16px 24px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

.btn-primary {
  background: #4a6cf7;
  color: white;
  box-shadow: 0 4px 14px rgba(74,108,247,0.3);
}

.btn-primary:hover {
  box-shadow: 0 6px 20px rgba(74,108,247,0.4);
}

.btn-secondary {
  background: #e8e8e8;
  color: #333;
}

.btn-secondary:hover {
  background: #ddd;
}

.groups {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  min-width: 0;
}

.group {
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.group h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 3px solid;
}

.group-blue h2 {
  color: #2196F3;
  border-color: #2196F3;
}

.group-red h2 {
  color: #f44336;
  border-color: #f44336;
}

.member-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.member-card {
  background: #f8f9fc;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 18px;
  font-weight: 500;
  color: #333;
}

.group-empty {
  color: #aaa;
  text-align: center;
  padding: 24px 0;
  font-size: 16px;
}

@media (max-width: 700px) {
  body {
    padding: 20px 12px;
  }

  .container {
    flex-direction: column;
    gap: 16px;
  }

  .input-section {
    flex: none;
    width: 100%;
  }

  .groups {
    width: 100%;
  }

  .btn-row {
    flex-direction: column;
  }

  textarea {
    min-height: 240px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="input-section">
    <textarea id="input" placeholder="每行輸入一個名字&#10;例：&#10;張小華&#10;李小美&#10;王大明"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="shuffle()">隨機分組</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
  </div>

  <div class="groups">
    <div class="group group-blue">
      <h2>藍方</h2>
      <div class="member-list" id="groupA">
        <div class="group-empty">請輸入名字後點擊分組</div>
      </div>
    </div>
    <div class="group group-red">
      <h2>紅方</h2>
      <div class="member-list" id="groupB">
        <div class="group-empty">請輸入名字後點擊分組</div>
      </div>
    </div>
  </div>
</div>

<script>
function shuffle() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) return;

  const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length < 2) return;

  for (let i = names.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [names[i], names[j]] = [names[j], names[i]];
  }

  const mid = Math.ceil(names.length / 2);
  const groupA = names.slice(0, mid);
  const groupB = names.slice(mid);

  render('groupA', groupA);
  render('groupB', groupB);
}

function render(id, members) {
  const el = document.getElementById(id);
  el.innerHTML = members.map(name => `<div class="member-card">${name}</div>`).join('');
}

function clearAll() {
  document.getElementById('input').value = '';
  render('groupA', []);
  render('groupB', []);
}
</script>
</body>
</html>
